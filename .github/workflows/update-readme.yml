name: Update README Widgets

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Update README with cache bust
        run: |
          TIMESTAMP=$(date +%s)
          
          # Simple: just replace the entire param sections
          python3 << EOF
          import re
          
          with open('README.md', 'r') as f:
              content = f.read()
          
          # Add cache bust to stats
          content = re.sub(
              r'(github-readme-stats\.vercel\.app/api\?username=kabirvashisht4-glitch[^)"\s]*)',
              r'\1&v=$TIMESTAMP',
              content
          )
          
          # Add cache bust to streak
          content = re.sub(
              r'(streak-stats\.demolab\.com\?user=kabirvashisht4-glitch[^)"\s]*)',
              r'\1&v=$TIMESTAMP',
              content
          )
          
          # Add cache bust to activity graph
          content = re.sub(
              r'(github-readme-activity-graph\.vercel\.app/graph\?username=kabirvashisht4-glitch[^)"\s]*)',
              r'\1&v=$TIMESTAMP',
              content
          )
          
          with open('README.md', 'w') as f:
              f.write(content)
          EOF
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git diff-index --quiet HEAD || git commit -m "🔄 Refresh widgets"
          git push
