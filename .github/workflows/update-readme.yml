name: Update README Widgets

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Update widget cache params
        run: |
          TIMESTAMP=$(date +%s)
          
          # Add cache-bust to github-readme-stats
          sed -i "s/github-readme-stats.vercel.app\/api?username=kabirvashisht4-glitch\([^[:space:]]*\)/github-readme-stats.vercel.app\/api?username=kabirvashisht4-glitch\1\&v=$TIMESTAMP/g" README.md
          
          # Add cache-bust to streak-stats
          sed -i "s/streak-stats.demolab.com?user=kabirvashisht4-glitch/streak-stats.demolab.com?user=kabirvashisht4-glitch\&v=$TIMESTAMP/g" README.md
          
          # Add cache-bust to activity-graph
          sed -i "s/github-readme-activity-graph.vercel.app\/graph?username=kabirvashisht4-glitch/github-readme-activity-graph.vercel.app\/graph?username=kabirvashisht4-glitch\&v=$TIMESTAMP/g" README.md
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "🔄 Refresh widgets" || exit 0
          git push
